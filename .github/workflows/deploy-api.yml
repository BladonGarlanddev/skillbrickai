name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Test, build, drift check
    runs-on: ubuntu-latest
    services:
      # Empty Postgres used by `prisma migrate diff` as a shadow DB to replay
      # migrations against, so we can compare schema.prisma vs the migrations
      # folder. No app data ever lives here.
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate --schema=src/prisma/schema.prisma

      # Reports any divergence between schema.prisma and what the migration
      # chain would create. NON-BLOCKING for now because the chain has
      # pre-existing holes (Research, ClaudeMd, Service have no migrations
      # — they were originally added via prisma db push). Once those are
      # backfilled, flip continue-on-error to false so drift becomes a hard
      # gate. The smoke test below catches drift at runtime in the meantime.
      - name: Detect schema/migration drift (warning only)
        id: drift_check
        continue-on-error: true
        working-directory: apps/api
        run: |
          npx prisma migrate diff \
            --from-migrations src/prisma/migrations \
            --to-schema-datamodel src/prisma/schema.prisma \
            --shadow-database-url postgresql://postgres:postgres@localhost:5432/shadow \
            --exit-code
      - name: Drift check result
        if: steps.drift_check.outcome == 'failure'
        run: echo "::warning::Schema/migration drift detected. Run prisma migrate diff locally to see what's missing. This is non-blocking until the migration chain is backfilled."

      - name: Run tests
        working-directory: apps/api
        run: pnpm test

      - name: Build
        working-directory: apps/api
        run: pnpm build

  deploy:
    name: Deploy to EC2
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eo pipefail
            cd ~/collective
            # Force working tree to match origin/main exactly. This survives
            # any local drift (stray untracked files from older clones, etc.)
            # that would otherwise block `git pull`. .env and anything in
            # .gitignore is preserved because `git clean` respects gitignore.
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            pnpm install --frozen-lockfile
            cd apps/api
            npx prisma generate --schema=src/prisma/schema.prisma
            # Baseline: prod's schema predates its _prisma_migrations table
            # (original provisioning was via `prisma db push`), so mark the
            # historical migrations as already applied. `|| true` makes each
            # call idempotent — the first deploy records them, subsequent
            # deploys no-op with "already resolved" errors we ignore.
            npx prisma migrate resolve --applied 20260329065940_init --schema=src/prisma/schema.prisma || true
            npx prisma migrate resolve --applied 20260402050000_add_skill_attribution --schema=src/prisma/schema.prisma || true
            npx prisma migrate resolve --applied 20260415045755_add_donations --schema=src/prisma/schema.prisma || true
            npx prisma migrate deploy --schema=src/prisma/schema.prisma
            pnpm build
            pm2 restart skillbrick-api
            pm2 save
            # Smoke test: hit a real endpoint that touches the User table via
            # joins. If the Prisma client and DB are out of sync, this 500s
            # and we fail the deploy loudly instead of leaving a broken API
            # running. Port 3000 is what main.ts listens on in prod (its .env
            # has no PORT set, so it falls through to the default).
            sleep 6
            status=$(curl -s -o /tmp/smoke -w "%{http_code}" "http://localhost:3000/skills?limit=1" || echo "000")
            if [ "$status" != "200" ]; then
              echo "❌ Smoke test failed: HTTP $status"
              echo "── response body ──"
              cat /tmp/smoke || true
              echo "── recent pm2 logs ──"
              pm2 logs skillbrick-api --lines 30 --nostream || true
              exit 1
            fi
            echo "✅ Smoke test passed (HTTP 200 from /skills?limit=1)"
