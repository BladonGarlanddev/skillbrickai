name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -eo pipefail
            cd ~/collective
            # Force working tree to match origin/main exactly. This survives
            # any local drift (stray untracked files from older clones, etc.)
            # that would otherwise block `git pull`. .env and anything in
            # .gitignore is preserved because `git clean` respects gitignore.
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            pnpm install --frozen-lockfile
            cd apps/api
            npx prisma generate --schema=src/prisma/schema.prisma
            npx prisma migrate deploy --schema=src/prisma/schema.prisma
            pnpm build
            pm2 restart skillbrick-api
            pm2 save
