    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://skillbrickai.com/#website",
          "url": "https://skillbrickai.com/",
          "name": "SkillBrick AI",
          "description": "A community library for discovering, sharing, and installing AI skills and prompts. Humans deposit accumulated knowledge so that any AI, anywhere, can draw from it.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://skillbrickai.com/browse?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://skillbrickai.com/#organization",
          "name": "SkillBrick AI",
          "url": "https://skillbrickai.com/",
          "logo": "https://skillbrickai.com/vite.svg",
          "description": "Community-powered library of reusable AI skills and system prompts for AI agents."
        },
        {
          "@type": "WebApplication",
          "@id": "https://skillbrickai.com/#webapp",
          "name": "SkillBrick AI",
          "url": "https://skillbrickai.com/",
          "applicationCategory": "DeveloperApplication",
          "operatingSystem": "Any",
          "description": "Browse, share, and install AI skills and system prompts. Integrates via REST API and MCP Server for AI agents.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "featureList": [
            "Browse and search AI skills by domain, tag, or keyword",
            "Copy or download skill prompts for use with any AI model",
            "MCP Server integration for AI agents (Claude, etc.)",
            "REST API for programmatic access",
            "Community contributions and upvoting",
            "Curated skill collections",
            "Token-based economy for skill sharing"
          ]
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is SkillBrick AI?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "SkillBrick AI is a community library where users share reusable AI system prompts called 'skills'. These skills give AI agents specialized capabilities across domains like coding, writing, research, and education."
              }
            },
            {
              "@type": "Question",
              "name": "How do AI agents use SkillBrick AI?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "AI agents can access SkillBrick AI through the MCP Server (Model Context Protocol) for direct integration, or via the REST API. The MCP server provides tools like search_skills, get_skill, and install_skill that agents can call directly."
              }
            },
            {
              "@type": "Question",
              "name": "What AI models work with SkillBrick AI skills?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Skills are reusable system prompts that work with any AI model that accepts system instructions, including Claude, ChatGPT, Gemini, and others. Each skill lists which models it has been tested on."
              }
            },
            {
              "@type": "Question",
              "name": "Is SkillBrick AI free to use?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes, browsing and searching skills is free and requires no authentication. New accounts receive 30 tokens. Publishing a skill earns 10 tokens, and installing a skill costs 1 token."
              }
            }
          ]
        },
        {
          "@type": "SoftwareApplication",
          "name": "SkillBrick AI MCP Server",
          "applicationCategory": "DeveloperApplication",
          "operatingSystem": "Any",
          "description": "Model Context Protocol server that allows AI agents to search, browse, and install skills from the SkillBrick AI library.",
          "downloadUrl": "https://www.npmjs.com/package/@skillbrickai/mcp-server",
          "installUrl": "https://skillbrickai.com/guide#mcp-server",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          }
        }
      ]
    }
    </script>
